# LOCAL DEVELOPMENT ONLY
# Spins up a PostgreSQL database so you can run `pnpm dev` locally.
# The Next.js + Payload app runs directly on your machine (not in Docker).
#
# Usage:
#   Start DB:  docker compose -f docker-compose.dev.yml up -d
#   Stop DB:   docker compose -f docker-compose.dev.yml down
#   Wipe data: docker compose -f docker-compose.dev.yml down -v

services:
  db:
    image: postgres:16-alpine
    container_name: yazit_db_dev
    environment:
      POSTGRES_USER: yazit_user
      POSTGRES_PASSWORD: yazit_password
      POSTGRES_DB: yazit_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yazit_user -d yazit_db']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_dev_data:
