# PRODUCTION DOCKER COMPOSE
# This file is used for deployment on the Ubuntu home server (bilgin@192.168.50.100).
# See docker-compose.dev.yml for local development (DB only).
#
# Deployment target:
#   - ybilgin.com        → app container (port 3000), routed via Nginx Proxy Manager
#   - admin.ybilgin.com  → same app container /admin route, routed via Nginx Proxy Manager
#
# First-time setup on server:
#   1. Copy .env.example to .env and fill in production values
#   2. Run: docker compose up -d
#
# Usage:
#   Start:   docker compose up -d
#   Rebuild: docker compose build app && docker compose up -d --no-deps app
#   Logs:    docker compose logs -f app
#   Stop:    docker compose down

services:
  db:
    image: postgres:16-alpine
    container_name: kronos_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /home/bilgin/kronos/postgres:/var/lib/postgresql/data
    networks:
      - kronos_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    cpus: '0.5'
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kronos_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
    volumes:
      - /home/bilgin/kronos/media:/app/public/media
    networks:
      - kronos_network
    mem_limit: 1536m
    cpus: '1.5'
    restart: unless-stopped

networks:
  kronos_network:
    driver: bridge
